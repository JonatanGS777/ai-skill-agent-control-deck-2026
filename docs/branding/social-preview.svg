<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="AI Skill and Agent Control Deck 2026">
  <defs>
    <!-- Backgrounds -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06101a"/>
      <stop offset="55%" stop-color="#0b1e2e"/>
      <stop offset="100%" stop-color="#0f2a3f"/>
    </linearGradient>
    <!-- Glow accents -->
    <radialGradient id="glow-tl" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#22c1ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22c1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-br" cx="100%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ff8b63" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff8b63" stop-opacity="0"/>
    </radialGradient>
    <!-- Gradient lines -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c1ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22c1ff" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2233" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#091929" stop-opacity="0.95"/>
    </linearGradient>
    <!-- Badge gradients -->
    <linearGradient id="badge-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f3555"/>
      <stop offset="100%" stop-color="#0d2e4a"/>
    </linearGradient>
    <linearGradient id="badge-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c2e1e"/>
      <stop offset="100%" stop-color="#0a2519"/>
    </linearGradient>
    <linearGradient id="badge-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#221540"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <linearGradient id="badge-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a1e10"/>
      <stop offset="100%" stop-color="#2e1808"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow-tl)"/>
  <rect width="1280" height="640" fill="url(#glow-br)"/>
  <rect width="1280" height="640" fill="url(#glow-center)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#8bdfff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Main card -->
  <rect x="56" y="48" width="1168" height="544" rx="20" fill="url(#card-grad)" stroke="#1e3a52" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Top accent line -->
  <rect x="56" y="48" width="1168" height="3" rx="2" fill="url(#line-grad)" opacity="0.9"/>

  <!-- Left decorative bar -->
  <rect x="56" y="48" width="4" height="544" rx="2" fill="url(#line-grad)" opacity="0.5"/>

  <!-- Version pill - top left -->
  <rect x="96" y="82" width="120" height="28" rx="14" fill="#0f2a3a" stroke="#2a5570" stroke-width="1"/>
  <text x="156" y="101" text-anchor="middle" fill="#8bdfff" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="13" font-weight="600" letter-spacing="1">v1.0.0 STABLE</text>

  <!-- CI badge - top left next to version -->
  <rect x="232" y="82" width="130" height="28" rx="14" fill="#0c2e1e" stroke="#235e3a" stroke-width="1"/>
  <circle cx="252" cy="96" r="5" fill="#4ade80"/>
  <text x="282" y="101" text-anchor="middle" fill="#95e6bc" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="13" font-weight="600" letter-spacing="1">CI PASSING</text>

  <!-- Main title -->
  <text x="96" y="195" fill="#e4edf5" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="68" font-weight="800" letter-spacing="-1">AI Skill &amp; Agent</text>
  <text x="96" y="275" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="68" font-weight="800" letter-spacing="-1">
    <tspan fill="#22c1ff">Control Deck</tspan>
    <tspan fill="#a78bfa"> 2026</tspan>
  </text>

  <!-- Subtitle -->
  <text x="96" y="324" fill="#7a9cb0" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="22" letter-spacing="0.5">Build · Measure · Scale · Govern · Release AI capabilities with logical rigor</text>

  <!-- Divider -->
  <line x1="96" y1="346" x2="700" y2="346" stroke="#1e3a52" stroke-width="1.5"/>

  <!-- Stats row -->
  <!-- Skills badge -->
  <rect x="96" y="368" width="230" height="72" rx="12" fill="url(#badge-blue)" stroke="#22547a" stroke-width="1.5"/>
  <text x="211" y="398" text-anchor="middle" fill="#22c1ff" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="34" font-weight="800">203</text>
  <text x="211" y="422" text-anchor="middle" fill="#6a93aa" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="15" letter-spacing="2">SKILLS</text>

  <!-- Agents badge -->
  <rect x="344" y="368" width="230" height="72" rx="12" fill="url(#badge-purple)" stroke="#4a3570" stroke-width="1.5"/>
  <text x="459" y="398" text-anchor="middle" fill="#a78bfa" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="34" font-weight="800">196</text>
  <text x="459" y="422" text-anchor="middle" fill="#6a5a8a" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="15" letter-spacing="2">AGENTS</text>

  <!-- Benchmark badge -->
  <rect x="592" y="368" width="230" height="72" rx="12" fill="url(#badge-green)" stroke="#235e3a" stroke-width="1.5"/>
  <text x="707" y="398" text-anchor="middle" fill="#4ade80" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="34" font-weight="800">100%</text>
  <text x="707" y="422" text-anchor="middle" fill="#3a6e4a" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="15" letter-spacing="2">BENCHMARK</text>

  <!-- Logic foundations badge -->
  <rect x="840" y="368" width="230" height="72" rx="12" fill="url(#badge-orange)" stroke="#7c4b39" stroke-width="1.5"/>
  <text x="955" y="398" text-anchor="middle" fill="#ff8b63" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="34" font-weight="800">30</text>
  <text x="955" y="422" text-anchor="middle" fill="#7a4a35" font-family="'Avenir Next', 'Inter', 'Segoe UI', sans-serif" font-size="15" letter-spacing="2">LOGIC CORES</text>

  <!-- Feature pills row -->
  <!-- logic -->
  <rect x="96" y="468" width="100" height="30" rx="15" fill="#0a1e2a" stroke="#22c1ff" stroke-width="1" stroke-opacity="0.5"/>
  <text x="146" y="488" text-anchor="middle" fill="#22c1ff" font-family="monospace" font-size="13" font-weight="600">logic</text>

  <!-- clarity -->
  <rect x="212" y="468" width="100" height="30" rx="15" fill="#0a1e2a" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="262" y="488" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="600">clarity</text>

  <!-- security -->
  <rect x="328" y="468" width="110" height="30" rx="15" fill="#0a1e2a" stroke="#4ade80" stroke-width="1" stroke-opacity="0.5"/>
  <text x="383" y="488" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="13" font-weight="600">security</text>

  <!-- utility -->
  <rect x="454" y="468" width="100" height="30" rx="15" fill="#0a1e2a" stroke="#ff8b63" stroke-width="1" stroke-opacity="0.5"/>
  <text x="504" y="488" text-anchor="middle" fill="#ff8b63" font-family="monospace" font-size="13" font-weight="600">utility</text>

  <!-- make quality -->
  <rect x="570" y="468" width="160" height="30" rx="15" fill="#0a1e2a" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.5"/>
  <text x="650" y="488" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="13" font-weight="600">make quality</text>

  <!-- MIT -->
  <rect x="746" y="468" width="80" height="30" rx="15" fill="#0a1e2a" stroke="#8bdfff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="786" y="488" text-anchor="middle" fill="#8bdfff" font-family="monospace" font-size="13" font-weight="600">MIT</text>

  <!-- Right panel: decorative code block -->
  <rect x="920" y="130" width="260" height="310" rx="14" fill="#040d14" stroke="#1a3548" stroke-width="1" opacity="0.95"/>
  <rect x="920" y="130" width="260" height="32" rx="14" fill="#0d2030"/>
  <rect x="920" y="148" width="260" height="14" rx="0" fill="#0d2030"/>
  <circle cx="943" cy="146" r="6" fill="#ff5f57"/>
  <circle cx="963" cy="146" r="6" fill="#febc2e"/>
  <circle cx="983" cy="146" r="6" fill="#28c840"/>
  <text x="940" y="185" fill="#3d6b80" font-family="monospace" font-size="12">$ make bootstrap</text>
  <text x="940" y="205" fill="#4ade80" font-family="monospace" font-size="11">✓ logic-pack installed</text>
  <text x="940" y="223" fill="#4ade80" font-family="monospace" font-size="11">✓ aliases configured</text>
  <text x="940" y="241" fill="#4ade80" font-family="monospace" font-size="11">✓ semver initialized</text>
  <text x="940" y="259" fill="#4ade80" font-family="monospace" font-size="11">✓ quality gate: PASS</text>
  <text x="940" y="282" fill="#3d6b80" font-family="monospace" font-size="12">$ make dashboard</text>
  <text x="940" y="300" fill="#22c1ff" font-family="monospace" font-size="11">→ Opening dashboard...</text>
  <text x="940" y="323" fill="#3d6b80" font-family="monospace" font-size="12">$ make release-auto</text>
  <text x="940" y="341" fill="#a78bfa" font-family="monospace" font-size="11">→ Released v1.0.0 ✓</text>
  <text x="940" y="364" fill="#3d6b80" font-family="monospace" font-size="12">$ _</text>
  <rect x="940" y="367" width="8" height="14" fill="#22c1ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom border line -->
  <path d="M96 568 H1184" stroke="url(#line-grad)" stroke-width="3" opacity="0.8"/>

  <!-- Bottom attribution -->
  <text x="640" y="596" text-anchor="middle" fill="#2a4d62" font-family="'Avenir Next', 'Inter', sans-serif" font-size="14" letter-spacing="2">github.com/jonatangs777/ai-skill-agent-control-deck-2026</text>
</svg>
